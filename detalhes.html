<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Veículo</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .details-container { background: white; max-width: 600px; width: 100%; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .main-img { width: 100%; height: 350px; background-size: cover; background-position: center; border-radius: 8px; margin-bottom: 15px; }
        .gallery { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; }
        .gallery-img { width: 80px; height: 60px; background-size: cover; background-position: center; cursor: pointer; border-radius: 4px; border: 2px solid transparent; }
        .gallery-img.active { border-color: #007bff; }
        h1 { margin: 0 0 10px 0; color: #333; }
        .price { font-size: 24px; color: #28a745; font-weight: bold; margin-bottom: 20px; }
        .specs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        .btn-whatsapp { display: block; text-align: center; background-color: #25D366; color: white; text-decoration: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 8px; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3); transition: 0.3s; }
        .btn-whatsapp:hover { background-color: #1ebd59; }
    </style>
</head>
<body>

    <div class="details-container" id="details-content">
        </div>

    <script>
        // Pega os dados do carro salvos no localStorage
        const car = JSON.parse(localStorage.getItem('selectedCar'));

        if (!car) {
            document.getElementById('details-content').innerHTML = "<h2>Erro: Nenhum carro selecionado.</h2>";
        } else {
            const formattedPrice = car.price.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            const formattedKm = car.km === 0 ? "Zero KM" : `${car.km.toLocaleString('pt-BR')} km`;
            
            // CONFIGURAÇÃO DO WHATSAPP: Insira seu número com DDD abaixo (apenas números)
            const numeroWhats = "5515999999999"; 
            const mensagem = `Olá! Gostaria de receber mais informações sobre o ${car.brand} ${car.name} (${car.year}) no valor de ${formattedPrice}.`;
            const linkWhatsapp = `https://api.whatsapp.com/send?phone=${15997660024}&text=${encodeURIComponent(mensagem)}`;

            // Cria a galeria de miniaturas de fotos
            let galleryHTML = "";
            car.imgs.forEach((img, idx) => {
                galleryHTML += `<div class="gallery-img ${idx === 0 ? 'active' : ''}" style="background-image: url('${img}')" onclick="changeMainImg('${img}', this)"></div>`;
            });

            document.getElementById('details-content').innerHTML = `
                <div class="main-img" id="main-image-view" style="background-image: url('${car.imgs[0]}')"></div>
                <div class="gallery">${galleryHTML}</div>
                
                <span>${car.brand}</span>
                <h1>${car.name}</h1>
                <div class="price">${formattedPrice}</div>
                
                <div class="specs">
                    <div>📅 <b>Ano:</b> ${car.year}</div>
                    <div>⛽ <b>Combustível:</b> ${car.fuel}</div>
                    <div>🛣️ <b>Quilometragem:</b> ${formattedKm}</div>
                    <div>🆔 <b>Código Ref:</b> #${car.id}</div>
                </div>

                <a href="${linkWhatsapp}" target="_blank" class="btn-whatsapp">
                    💬 Conversar no WhatsApp
                </a>
            `;
        }

        // Função para trocar a foto principal ao clicar nas miniaturas da galeria
        function changeMainImg(imgUrl, element) {
            document.getElementById('main-image-view').style.backgroundImage = `url('${imgUrl}')`;
            document.querySelectorAll('.gallery-img').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
